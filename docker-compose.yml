services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: st_trading
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - st_trading_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d st_trading"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend_api
    restart: unless-stopped
    env_file:
      - ./backend_api/.env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  st_trading_db:
