name: Build ST Trading AI Bot

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Backend API URL, for example https://api.example.com/api/v1"
        required: false
        default: ""
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create Android project
        run: flutter create --platforms=android --org com.sttrading --project-name st_trading_ai_bot build_app

      - name: Copy source
        run: |
          rm -rf build_app/lib build_app/assets build_app/test
          cp -R app_source/lib build_app/lib
          cp -R app_source/assets build_app/assets
          cp app_source/pubspec.yaml build_app/pubspec.yaml
          cp app_source/analysis_options.yaml build_app/analysis_options.yaml
          sed -i 's/android:label="st_trading_ai_bot"/android:label="ST Trading AI Bot"/g' build_app/android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"/>' build_app/android/app/src/main/AndroidManifest.xml

      - name: Install and analyze
        working-directory: build_app
        run: |
          flutter pub get
          flutter analyze lib

      - name: Resolve API URL
        id: api
        shell: bash
        run: |
          URL="${{ github.event.inputs.api_base_url }}"
          if [ -z "$URL" ]; then URL=""; fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Build APK and AAB
        working-directory: build_app
        run: |
          flutter build apk --release --dart-define=API_BASE_URL=${{ steps.api.outputs.url }}
          flutter build appbundle --release --dart-define=API_BASE_URL=${{ steps.api.outputs.url }}

      - name: Collect artifacts
        run: |
          mkdir release
          cp build_app/build/app/outputs/flutter-apk/app-release.apk release/ST-Trading-AI-Bot.apk
          cp build_app/build/app/outputs/bundle/release/app-release.aab release/ST-Trading-AI-Bot.aab

      - uses: actions/upload-artifact@v4
        with:
          name: ST-Trading-AI-Bot-Fullstack-Build
          path: release/*
          retention-days: 30
